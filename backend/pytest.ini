[pytest]
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=html
    --cov-report=term
    --cov-report=xml
    --cov-fail-under=80
    --cov-config=.coveragerc
markers =
    slow: marks tests as slow
    integration: marks integration tests
    unit: marks unit tests